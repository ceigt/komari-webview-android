name: Build and release Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Build installable APK
        run: gradle --no-daemon :app:assembleDebug

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk komari-v1.0.1.apk

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: komari-v1.0.1
          path: komari-v1.0.1.apk
          if-no-files-found: error

      - name: Create or update v1.0.1 release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view v1.0.1 >/dev/null 2>&1; then
            gh release edit v1.0.1 --title "komari Android 1.0.1"
            gh release upload v1.0.1 komari-v1.0.1.apk --clobber
          else
            gh release create v1.0.1 komari-v1.0.1.apk               --title "komari Android 1.0.1"               --notes "修复 Android 15/API 35 Edge-to-Edge 系统栏适配，避免顶部工具栏与状态栏、刘海或挖孔区域重叠，并为底部导航栏保留安全距离。APK 使用 Android 调试签名，适合个人侧载。"
          fi
