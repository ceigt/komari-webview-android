name: Build and release Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Validate signing secrets
        shell: bash
        run: |
          for name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing required signing secret: $name"
              exit 1
            fi
          done

      - name: Restore release keystore
        shell: bash
        run: |
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/komari-release.jks"
          echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/komari-release.jks" >> "$GITHUB_ENV"

      - name: Build signed release APK
        run: gradle --no-daemon :app:assembleRelease

      - name: Verify fixed signing certificate
        shell: bash
        run: |
          APK="app/build/outputs/apk/release/app-release.apk"
          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort -V | tail -n 1)"
          if [ -z "$APKSIGNER" ]; then
            echo "::error::Android apksigner was not found"
            exit 1
          fi
          "$APKSIGNER" verify --verbose --print-certs "$APK" | tee "$RUNNER_TEMP/apk-signature.txt"
          APK_CERT_SHA256="$(sed -n 's/^Signer #1 certificate SHA-256 digest: //p' "$RUNNER_TEMP/apk-signature.txt" | head -n 1 | tr -d ':' | tr '[:upper:]' '[:lower:]')"
          KEYSTORE_CERT_SHA256="$(keytool -exportcert \
            -keystore "$ANDROID_KEYSTORE_PATH" \
            -storepass "$ANDROID_KEYSTORE_PASSWORD" \
            -alias "$ANDROID_KEY_ALIAS" \
            | sha256sum | awk '{print $1}')"
          if [ -z "$APK_CERT_SHA256" ] || [ "$APK_CERT_SHA256" != "$KEYSTORE_CERT_SHA256" ]; then
            echo "::error::APK certificate does not match the fixed release keystore"
            exit 1
          fi
          echo "Verified fixed release certificate SHA-256: $APK_CERT_SHA256"

      - name: Rename APK
        run: cp app/build/outputs/apk/release/app-release.apk komari-v1.1.0.apk

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: komari-v1.1.0
          path: komari-v1.1.0.apk
          if-no-files-found: error

      - name: Create or update v1.1.0 release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view v1.1.0 >/dev/null 2>&1; then
            gh release edit v1.1.0 --title "komari Android 1.1.0"
            gh release upload v1.1.0 komari-v1.1.0.apk --clobber
          else
            gh release create v1.1.0 komari-v1.1.0.apk \
              --title "komari Android 1.1.0" \
              --notes "首次采用固定正式签名发布。后续正式版本可直接覆盖升级；从 v1.0.x 调试签名版本迁移时必须先卸载旧版。包含 Android 15/API 35 系统栏安全区域修复。"
          fi

      - name: Remove restored keystore
        if: always()
        shell: bash
        run: rm -f "$RUNNER_TEMP/komari-release.jks"
